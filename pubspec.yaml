name: school_app
description: A role-based school management system

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  get_storage: ^2.1.1
  dio: ^5.4.0
  # intl:^0.19.0  i changed this to  intl: ^0.20.2  to check all screen sizes
  intl: ^0.20.2
  file_picker: ^8.0.0+1
  flutter_image_compress: ^2.2.0
  image_picker: ^1.0.4
  photo_view: ^0.15.0
  cached_network_image: ^3.3.0
  video_player: ^2.8.2
  chewie: ^1.7.4
  url_launcher: ^6.2.2
  fl_chart: ^0.66.1
  package_info_plus: ^8.0.2
  table_calendar: ^3.0.9
  flutter_svg: ^2.0.9

  collection: any
  shared_preferences: ^2.5.5
  flutter_staggered_grid_view: ^0.7.0
  flutter_social_button: ^1.1.6+1
  toggle_switch: ^2.3.0
  # this one is for to check with all screen sizes
  device_preview: ^1.2.0
  flutter_secure_storage: ^9.2.2
  flutter_native_splash: ^2.4.7
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/daily-grades-play-store-icon.png"  # your icon file path

  adaptive_icon_background: "#FFFFFF"      # background color for adaptive icon
  adaptive_icon_foreground: "assets/icons/daily-grades-play-store-icon.png"  # optional
flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/icons/instagram.svg
    - assets/icons/facebook.svg
    - assets/icons/linkedin.svg
    - assets/icons/youtube.svg
